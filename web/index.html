<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SHARP — Smart Hand Automated Recognition Project</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header>
      <h1>SHARP</h1>
      <p id="status">Initializing camera...</p>
    </header>

    <main>
      <div class="feed">
        <video id="video" playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>

      <aside class="counter">
        <span class="counter-label">Total fingers</span>
        <span id="total" class="counter-value">0</span>
      </aside>
    </main>

    <script type="module" src="index.js"></script>
  </body>
</html>
